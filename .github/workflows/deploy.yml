name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow one concurrent deploy; don't cancel an in-progress production deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Derive Vite's base from the repo name: "/<repo>/" for a project page,
      # or "/" for a user/org page (a repo literally named <user>.github.io).
      - name: Compute base path
        id: base
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == *.github.io ]]; then echo "base=/" >> "$GITHUB_OUTPUT";
          else echo "base=/$REPO/" >> "$GITHUB_OUTPUT"; fi
      - name: Build
        run: npm run build
        env:
          VITE_BASE: ${{ steps.base.outputs.base }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
